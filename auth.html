<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>認証中...</title>
</head>
<body>
    <script>
        (function() {
            const hash = window.location.hash;
            if (hash && hash.includes('access_token')) {
                const params = new URLSearchParams(hash.substring(1));
                const at = params.get('access_token');
                const rt = params.get('refresh_token');

                if (at && rt) {
                    // トークンをURLのクエリ(?at=...&rt=...)にして新サーバーへ飛ばす
//                    window.location.replace(`https://sim.nakamon.net/?at=${at}&rt=${rt}`); // conoha用
                    window.location.replace(`https://n-lator.streamlit.app/?at=${at}&rt=${rt}`); // streamlit用
                    return;
                }
            }
            // Cookie保存後、ハッシュ無しの綺麗なURLでStreamlitへ遷移
//            window.location.replace('https://sim.nakamon.net/'); // conoha用
            window.location.replace('https://n-lator.streamlit.app/'); // streamlit用
        })();
    </script>
</body>
</html>
