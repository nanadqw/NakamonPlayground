<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>デバッグ中...</title>
    <style>
        body { font-family: sans-serif; padding: 2em; word-break: break-all; }
        .box { background: #f0f0f0; padding: 1em; border-radius: 8px; margin-bottom: 1em; }
    </style>
</head>
<body>
    <h2>🔍 認証デバッグ画面（ここで止まります）</h2>
    <p>Supabaseからどういう状態で飛んできたかを確認します。</p>
    
    <div class="box">
        <strong>1. 現在の完全なURL:</strong>
        <div id="url" style="color: blue;"></div>
    </div>
    
    <div class="box">
        <strong>2. ハッシュ (#以降):</strong>
        <div id="hash" style="color: red;"></div>
    </div>
    
    <div class="box">
        <strong>3. クエリ (?以降):</strong>
        <div id="query" style="color: green;"></div>
    </div>

    <script>
        document.getElementById('url').innerText = window.location.href;
        document.getElementById('hash').innerText = window.location.hash || "(なし)";
        document.getElementById('query').innerText = window.location.search || "(なし)";
    </script>
</body>
</html>
